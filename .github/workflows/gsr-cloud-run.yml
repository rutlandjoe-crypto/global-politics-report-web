name: GSR Morning Run

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC only.
    # 9 AM ET = 13:00 UTC during daylight time / 14:00 UTC during standard time
    # 3 PM ET = 19:00 UTC during daylight time / 20:00 UTC during standard time
    # 9 PM ET = 01:00 UTC next day during daylight time / 02:00 UTC during standard time
    - cron: "0 13 * * *"
    - cron: "0 19 * * *"
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: gsr-morning-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-gsr:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONUNBUFFERED: "1"
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      GSR_DISABLE_SOCIAL_POSTS: "false"

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests python-dotenv tweepy
          fi

      - name: Run master runner
        run: |
          echo "POLITICS BLOCK START"
          python master_runner.py
          echo "POLITICS BLOCK FINISH"

      - name: Clean unwanted generated files
        run: |
          find . -type d -name "__pycache__" -prune -exec rm -rf {} + || true
          rm -rf "C:\\Users\\joeru\\OneDrive\\Desktop\\global-politics-report-web" || true


      - name: Guard Politics report quality before commit
        run: python scripts/check_politics_agent.py
      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add public/latest_report.json public/latest_report.txt || true

          if git diff --cached --quiet; then
            echo "No politics report changes to commit."
            exit 0
          fi

          git commit -m "Update politics report"

          git pull --rebase origin main
          git push origin HEAD:main
